<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Novo Lote</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/industria">Indústria</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/industria">Lotes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/novo-lote">Novo Lote</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/incidentes">Incidentes</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container mt-5 mb-5">
            <h2 class="mb-1">Novo Lote</h2>
            <p class="text-muted mb-4">Cadastre um novo lote de material esportivo</p>
            <hr class="mb-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/novo-lote}" method="post">
                        <div class="row g-3 mb-3">
                            <div class="col-md-8">
                                <label class="form-label">Produto</label>
                                <input type="text" class="form-control" name="nome_pedido" placeholder="Ex: Bolas de Futebol" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Código</label>
                                <input type="text" class="form-control" name="codigo" placeholder="Ex: COD-0006" required>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Peso (kg)</label>
                                <input type="number" step="0.01" class="form-control" name="peso" placeholder="Ex: 5.50" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Quantidade</label>
                                <input type="number" class="form-control" name="quantidade" placeholder="Ex: 10" required>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome do Cliente</label>
                                <input type="text" class="form-control" name="nome_cliente" placeholder="Ex: João da Silva" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">E-mail do Cliente</label>
                                <input type="email" class="form-control" name="email_cliente" placeholder="Ex: joao@email.com" required>
                            </div>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Status inicial</label>
                                <select class="form-select" name="status" required>
                                    <option value="Pedido Solicitado" selected>Pedido Solicitado</option>
                                    <option value="Em Produção">Em Produção</option>
                                    <option value="Disponivel para Despacho">Disponível para Despacho</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="/industria" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Cadastrar Lote</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
