

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Acesso ao Sistema</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body class="bg-light d-flex align-items-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div th:if="${erroServidor}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                        <span th:text="${erroServidor}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                        <span th:text="${mensagemSucesso}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-header bg-primary text-white py-3 text-center">
                            <h5 class="card-title mb-0 fw-semibold">Login</h5>
                        </div>
                        <div class="card-body p-4">
                            <p class="text-secondary text-center small mb-4">Insira suas credenciais para acessar o painel</p>
                            
                            <form th:action="@{/logar}" th:object="${credenciais}" method="POST" class="needs-validation">

                                <div class="mb-3">
                                    <label for="email" class="form-label fw-medium">Email</label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Seu e-mail" required autofocus>
                                </div>
                                <div class="mb-4">
                                    <label for="senha" class="form-label fw-medium">Senha</label>
                                    <input type="password" class="form-control" id="senha" th:field="*{senha}" placeholder="Sua senha" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary py-2 fw-medium shadow-sm">Entrar</button>   
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <p class="mb-1 text-secondary small">Não tem cadastro?</p>
                        <a th:href="@{/cadastrar}" class="text-primary fw-medium text-decoration-none small">
                            Cadastre-se aqui
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
