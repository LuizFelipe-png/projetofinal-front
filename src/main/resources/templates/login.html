<html lang="pt-br">
    <head>
        <title>Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://jsdelivr.net" rel="stylesheet">
    </head>
    <body class="vh-100 d-flex justify-content-center align-items-center bg-light">

        <div class="card shadow-sm" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">
                
                <h2 class="card-title text-center mb-4 text-primary">Entrar</h2>
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="nome@gmail.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Acessar Conta
                    </button>
                    
                </form>
                <div class="text-center mt-4">
                <p class="mb-1">
                    Não tem cadastro?
                </p>

                <a th:href="@{/cadastrar}">
                    Cadastre-se aqui
                </a>
            </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
