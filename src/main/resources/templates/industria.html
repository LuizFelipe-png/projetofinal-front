<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Indústria</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>          
    <body>           
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/industria">Indústria</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/industria">Lotes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/novo-lote">Novo Lote</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/incidentes">Incidentes</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container mt-5 mb-5">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h2 class="mb-0">Lotes</h2>
                <a href="/novo-lote" class="btn btn-primary">+ Novo Lote</a>
            </div>
            <p class="text-muted mb-4">Gerencie os lotes de material esportivo e acompanhe o status de cada entrega</p>
            <hr class="mb-4">
            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Produto</th>
                                <th>Cliente</th>
                                <th>Status</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pedido : ${lotes}">
                                <td><strong th:text="${pedido.codigo}"></strong></td>
                                <td th:text="${pedido.nome_pedido}"></td>
                                <td th:text="${pedido.nome_cliente}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${pedido.status == 'Entregue'} ? 'bg-success' : (${pedido.status == 'Em Rota'} ? 'bg-warning text-dark' : (${pedido.status == 'Avaria na Carga' or pedido.status == 'Incidente de Transporte'} ? 'bg-danger' : 'bg-secondary'))"
                                          th:text="${pedido.status}"></span>
                                </td>
                                <td class="text-end">
                                    <a href="#" class="btn btn-sm btn-outline-secondary">Detalhes</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(lotes)}">
                                <td colspan="5" class="text-center text-muted py-4">Nenhum lote cadastrado ainda</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
