<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Acesso ao Sistema</title>
        <link class="cdn" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body class="bg-light d-flex align-items-center min-vh-100">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">

                    <div th:if="${erroServidor}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                        <span th:text="${erroServidor}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-header bg-primary text-white py-3 text-center">
                            <h5 class="card-title mb-0 fw-semibold">Cadastrar</h5>
                        </div>
                        <div class="card-body p-4">
                            <p class="text-secondary text-center small mb-4">Insira suas credenciais para acessar o painel</p>

                            <form th:action="@{/cadastrar}" th:object="${user}" method="POST" class="needs-validation">

                                <div class="mb-4">
                                    <label for="nome" class="form-label fw-medium">Nome</label>
                                    <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Seu nome" required>
                                </div>

                                <div class="mb-3">
                                    <label for="telefone" class="form-label fw-medium">Telefone</label>
                                    <input type="tel" class="form-control" id="telefone" th:field="*{telefone}" placeholder="(11) 99999-9999" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label fw-medium">Email:</label>
                                    <input type="text" class="form-control" id="email" th:field="*{email}" placeholder="Seu e-mail" required autofocus>
                                </div>

                                <div class="mb-4">
                                    <label for="senha" class="form-label fw-medium">Senha</label>
                                    <input type="password" class="form-control" id="senha" th:field="*{senha}" placeholder="Sua senha" required>
                                </div>

                                <div class="dropdown-center mb-3">
                                    <button class="btn dropdown-toggle w-100 text-start d-flex justify-content-between align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="background-color: #ffffff; color: #495057; border-color: #ced4da;">
                                        <span id="texto-cargo">Cargo:</span>
                                    </button>

                                    <ul class="dropdown-menu w-100">
                                        <li><a class="dropdown-item" href="#" onclick="document.getElementById('texto-cargo').innerText = 'Entregador'; document.getElementById('role-input').value = 'Entregador';">Entregador</a></li>
                                        <li><a class="dropdown-item" href="#" onclick="document.getElementById('texto-cargo').innerText = 'Operador Logistico'; document.getElementById('role-input').value = 'Operador Logistico';">Operador Logistico</a></li>
                                    </ul>
                                    
                                    

                                    <input type="hidden" id="role-input" name="role" value="">
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary py-2 fw-medium shadow-sm">Cadastrar</button>   
                                </div>

                            </form>
                            <div class="text-center mt-4">
                                <p class="mb-1 text-secondary small">Já tem login?</p>
                                <a th:href="@{/login}" class="text-primary fw-medium text-decoration-none small">
                                    Faça login
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
