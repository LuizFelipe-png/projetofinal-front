<html>
    <head>
        <title>Cadastrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="card shadow-sm" style="max-width: 400px; width: 100%;">
            <div class="card-body p-4">

                <h2 class="card-title text-center mb-4 text-primary">Entrar</h2>

                <form action="/cadastrar" method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Usuário</label>
                        <input type="text" id="usuario" name="usuario" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="nome@gmail.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Acessar Conta
                    </button>

                </form>
                <div class="text-center mt-4">
                    <p class="mb-1">
                        Já tem login?
                    </p>

                    <a th:href="@{/login}">
                        Logar
                    </a>
                </div>
            </div>
    </body>
</html>
